<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ตรรกะการตรวจ — Skill Knowledge Graph</title>
<style>
  :root{
    --bg:#ffffff; --border:#ececee; --border2:#e2e2e6;
    --text:#111827; --mut:#6b7280; --faint:#9ca3af;
    --chip-bg:#f4f4f5; --chip-tx:#71717a; --hover:#fafafa; --active:#f4f4f5;
    --ink:#111; --line:#e6e6e9;
    --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:'Inter','Noto Sans Thai',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
  .app{height:100vh;display:flex;flex-direction:column;overflow:hidden}

  header{flex:none;padding:24px 30px 18px;border-bottom:1px solid var(--border)}
  header h1{font-size:25px;font-weight:700;letter-spacing:-.3px}
  header .sub{font-size:13.5px;color:var(--mut);margin-top:4px;max-width:760px}

  .board{flex:1;display:flex;min-height:0}
  .graph{flex:1;position:relative;min-width:0;background:#fcfcfd}
  #svg{position:absolute;inset:0;width:100%;height:100%;cursor:grab}
  .loading{position:absolute;inset:0;display:grid;place-items:center;color:var(--mut);font-size:13px}
  .legend{position:absolute;left:18px;bottom:16px;background:rgba(255,255,255,.9);backdrop-filter:blur(4px);border:1px solid var(--border);border-radius:12px;padding:9px 13px;display:flex;flex-wrap:wrap;gap:5px 16px;font-size:11.5px;color:var(--mut)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .legend i{width:9px;height:9px;border-radius:50%;flex:none}
  .legend i.hollow{background:#fff;border:1.4px solid var(--faint)}
  .legend i.dash{width:16px;height:0;border-radius:0;border-top:1.6px dashed var(--ink)}

  .rail{width:392px;flex:none;background:var(--bg);border-left:1px solid var(--border);overflow-y:auto;padding:24px}
  .back{appearance:none;background:none;border:0;color:var(--mut);font:inherit;font-size:12.5px;cursor:pointer;padding:0;margin-bottom:16px;display:inline-flex;align-items:center;gap:5px}
  .back:hover{color:var(--text)}
  .pname{font-size:20px;font-weight:700;letter-spacing:-.2px;line-height:1.2}
  .pmeta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:10px 0 2px}
  .pill{font-size:11px;font-weight:600;padding:2px 11px;border-radius:99px}
  .pill.ok{background:var(--ink);color:#fff} .pill.todo{background:var(--chip-bg);color:var(--chip-tx)}
  .cat{font-size:11px;font-weight:600;color:var(--chip-tx);background:var(--chip-bg);padding:2px 11px;border-radius:99px}
  .pnote{font-size:12px;color:var(--mut);margin-top:2px}
  .k{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);font-weight:700;margin:18px 0 7px}
  .body{font-size:13.5px;line-height:1.68}
  .body.mut{color:var(--mut);font-size:12.8px}
  ol.steps{list-style:none;counter-reset:s}
  ol.steps li{counter-increment:s;position:relative;padding:4px 0 4px 30px;font-size:13px}
  ol.steps li::before{content:counter(s);position:absolute;left:0;top:3px;width:20px;height:20px;border-radius:50%;background:var(--ink);color:#fff;font-weight:600;font-size:11px;display:grid;place-items:center}
  .rule{background:var(--hover);border:1px solid var(--border);border-radius:9px;padding:9px 12px;font-family:var(--mono);font-size:12px;color:var(--text);margin:6px 0;white-space:pre-wrap;line-height:1.55}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{display:inline-block;background:var(--chip-bg);color:var(--chip-tx);border:1px solid transparent;border-radius:8px;padding:3px 10px;font-size:12px}
  a.chip{cursor:pointer;text-decoration:none}
  a.chip:hover{border-color:var(--border2);color:var(--text);background:#fff}
  a.chip.ver{background:var(--ink);color:#fff}
  .reflist a{display:block;color:var(--text);text-decoration:underline;text-decoration-color:var(--border2);text-underline-offset:2px;font-size:12.8px;padding:3px 0}
  .reflist a:hover{text-decoration-color:var(--ink)}
  .pending{background:var(--hover);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:12.3px;color:var(--mut);margin:11px 0}
  .ban{display:flex;align-items:baseline;gap:10px;margin:14px 0 0}
  .ban .v{font-size:30px;font-weight:700;letter-spacing:-1px}.ban .l{font-size:12.5px;color:var(--mut)}
  .progress{height:6px;border-radius:99px;background:#f1f1f3;overflow:hidden;margin:10px 0 2px}
  .progress i{display:block;height:100%;background:var(--ink)}
  .grp{margin:13px 0}
  .grp-h{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .fade{animation:fade .22s cubic-bezier(.22,1,.36,1)}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion: reduce){.fade{animation:none}}
  @media(max-width:820px){.board{flex-direction:column}.graph{height:54vh;flex:none}.rail{width:auto;border-left:0;border-top:1px solid var(--border)}}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>ตรรกะการตรวจ</h1>
    <p class="sub">Skill / Audit Knowledge Graph — คลิก node เพื่อดูว่าตรวจอะไร (What), อย่างไร (How), ตัดสินด้วยกฎใด (Decision Rule) · Final URL คือ node กลางที่ duplicate/canonical ต้องผ่านก่อน</p>
  </header>
  <div class="board">
    <section class="graph">
      <div class="loading" id="loading">กำลังโหลดกราฟ…</div>
      <svg id="svg" style="display:none"></svg>
      <div class="legend" id="legend"></div>
    </section>
    <aside class="rail" id="panel"></aside>
  </div>
</div>
<script>
if(window.self!==window.top)document.documentElement.classList.add('embed');
const esc=s=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
let DATA,POS={};
fetch('/skill-graph.json').then(r=>r.json()).then(d=>{DATA=d;init();}).catch(()=>{document.getElementById('loading').textContent='โหลดกราฟไม่สำเร็จ';});

function layout(nodes,edges,W,H){
  const keys=[...new Set(nodes.map(n=>n.cat))].filter(k=>k!=='root');
  const anchor={root:{x:W/2,y:H/2}};
  keys.forEach((k,i)=>{const a=i/keys.length*2*Math.PI-Math.PI/2;anchor[k]={x:W/2+Math.cos(a)*W*0.31,y:H/2+Math.sin(a)*H*0.33};});
  if(anchor.urlnorm)anchor.urlnorm={x:W/2,y:H*0.41};
  nodes.forEach((n,i)=>{const a=anchor[n.cat]||anchor.root;n.x=a.x+Math.cos(i*2.399)*46;n.y=a.y+Math.sin(i*2.399)*46;n.vx=n.vy=0;});
  const map=Object.fromEntries(nodes.map(n=>[n.id,n]));
  const E=edges.map(e=>[map[e[0]],map[e[1]]]).filter(e=>e[0]&&e[1]);
  for(let it=0;it<360;it++){const cool=1-it/450;
    for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){const a=nodes[i],b=nodes[j];let dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy||1,d=Math.sqrt(d2);const rep=1600/d2,fx=dx/d*rep,fy=dy/d*rep;a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;}
    for(const[a,b]of E){let dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1;const f=(d-64)*0.02,fx=dx/d*f,fy=dy/d*f;a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;}
    for(const n of nodes){const a=anchor[n.cat]||anchor.root;n.vx+=(a.x-n.x)*0.013;n.vy+=(a.y-n.y)*0.013;}
    for(const n of nodes){n.x+=Math.max(-9,Math.min(9,n.vx*0.85*cool));n.y+=Math.max(-9,Math.min(9,n.vy*0.85*cool));n.vx*=0.55;n.vy*=0.55;}
  }
}
function init(){
  const W=940,H=680; layout(DATA.nodes,DATA.edges,W,H);
  const map=Object.fromEntries(DATA.nodes.map(n=>[n.id,n]));
  let a=1e9,b=1e9,c=-1e9,e=-1e9;
  DATA.nodes.forEach(n=>{a=Math.min(a,n.x);b=Math.min(b,n.y);c=Math.max(c,n.x);e=Math.max(e,n.y);});
  const pad=48;
  const rOf=n=>n.id==='__root'?12:n.hub?8.5:(n.verified?8:3.2);
  // monochrome: ดำ=ยืนยัน/hub/root · เทาจาง=รอตรวจ
  const fillOf=n=>{if(n.id==='__root')return'#111';if(n.hub)return'#71717a';if(n.verified)return'#111';return'#d4d4d8';};
  DATA.nodes.forEach(n=>POS[n.id]={x:n.x,y:n.y,r:rOf(n)});
  const edgesH=DATA.edges.map(g=>{const x=map[g[0]],y=map[g[1]];if(!x||!y)return'';const dep=g[2]==='dep';return `<line x1="${x.x.toFixed(1)}" y1="${x.y.toFixed(1)}" x2="${y.x.toFixed(1)}" y2="${y.y.toFixed(1)}" stroke="${dep?'#111':'#e4e4e7'}" stroke-width="${dep?1.5:.9}" ${dep?'stroke-dasharray="3 3"':''}/>`;}).join('');
  const nodesH=DATA.nodes.map(n=>{
    const isHub=n.hub||n.id==='__root', r=rOf(n), show=isHub||n.verified;
    const lbl=show?`<text class="lbl ${isHub?'hub':''}" x="${n.x.toFixed(1)}" y="${(n.y-r-6).toFixed(1)}" text-anchor="middle">${esc(n.label)}</text>`:'';
    const clk=!String(n.id).startsWith('__');
    return `<g class="gnode" ${clk?`onclick="sel('${n.id}')" style="cursor:pointer"`:''}><title>${esc(n.label)}${n.verified?' — ยืนยันแล้ว':String(n.id).startsWith('__')?'':' — รอตรวจ'}</title><circle id="c-${esc(n.id)}" cx="${n.x.toFixed(1)}" cy="${n.y.toFixed(1)}" r="${r}" fill="${fillOf(n)}" stroke="#fff" stroke-width="1.3"/>${lbl}</g>`;
  }).join('');
  const svg=document.getElementById('svg');
  svg.setAttribute('viewBox',`${a-pad} ${b-pad} ${c-a+pad*2} ${e-b+pad*2}`);
  svg.setAttribute('preserveAspectRatio','xMidYMid meet');
  svg.innerHTML=`<defs><style>.lbl{font-family:'Inter','Noto Sans Thai',sans-serif;font-size:10.5px;fill:#52525b;paint-order:stroke;stroke:#fcfcfd;stroke-width:3px;stroke-linejoin:round}.lbl.hub{font-size:12px;font-weight:700;fill:#111}.gnode circle{transition:r .12s ease-out}.gnode:hover circle{r:9.5}</style></defs><circle id="selring" r="0" fill="none" stroke="#111" stroke-width="1.5" opacity="0"/><g>${edgesH}</g><g>${nodesH}</g>`;
  document.getElementById('loading').style.display='none'; svg.style.display='block';
  document.getElementById('legend').innerHTML=`<span><i style="background:#111"></i>ยืนยันแล้ว</span><span><i class="hollow"></i>รอตรวจ</span><span><i style="background:#71717a"></i>หมวด (hub)</span><span><i class="dash"></i>dependency (Final URL)</span>`;
  summary();
}
function setSel(id){const p=POS[id],r=document.getElementById('selring');if(!r)return;if(p){r.setAttribute('cx',p.x);r.setAttribute('cy',p.y);r.setAttribute('r',p.r+5);r.setAttribute('opacity','1');}else r.setAttribute('opacity','0');}
function summary(){
  setSel(null);
  const checks=DATA.nodes.filter(n=>!String(n.id).startsWith('__'));
  const ver=checks.filter(n=>n.verified),todo=checks.filter(n=>!n.verified);
  const pct=Math.round(ver.length/checks.length*100);
  const byCat={};todo.forEach(n=>{(byCat[n.cat]=byCat[n.cat]||[]).push(n);});
  let h=`<div class="pname">สถานะการยืนยัน</div>
    <div class="ban"><span class="v">${ver.length}</span><span class="l">ยืนยันความถูกต้องแล้ว<br>(deep-review + เว็บจริง)</span></div>
    <div class="progress"><i style="width:${pct}%"></i></div>
    <div class="body mut">เหลือ ${todo.length} รายการที่ทำงานอยู่แต่ยังไม่ไล่ตรวจ false-positive — คลิกชื่อเพื่อดู logic ที่เสนอ</div>
    <div class="k">ยืนยันถูกต้องแล้ว</div><div class="chips">${ver.map(n=>`<a class="chip ver" onclick="sel('${esc(n.id)}')">${esc(n.label)}</a>`).join('')}</div>
    <div class="k">รอไล่ตรวจ (${todo.length})</div>`;
  for(const ct of DATA.cats){const arr=byCat[ct.key];if(!arr||!arr.length)continue;
    h+=`<div class="grp"><div class="grp-h"><span class="cat">${esc(ct.label)}</span><span class="body mut">${arr.length}</span></div><div class="chips">${arr.map(n=>`<a class="chip" onclick="sel('${esc(n.id)}')">${esc(n.label)}</a>`).join('')}</div></div>`;}
  paint(h);
}
function sel(id){
  const n=(DATA.nodes||[]).find(x=>x.id===id); if(!n)return; setSel(id);
  const cat=(DATA.cats||[]).find(x=>x.key===n.cat)||{label:n.cat};
  const pend=n.verified?'':' · เสนอ (รอ review)';
  const refs=(n.refs||[]).map(r=>`<a href="${esc(r[1])}" target="_blank" rel="noopener">${esc(r[0])}</a>`).join('')||'<span class="body mut">—</span>';
  let h=`<button class="back" onclick="summary()">‹ ทั้งหมด</button>
    <div class="pname">${esc(n.label)}</div>
    <div class="pmeta"><span class="cat">${esc(cat.label)}</span><span class="pill ${n.verified?'ok':'todo'}">${n.verified?'ยืนยันถูกต้องแล้ว':'รอตรวจสอบ'}</span></div>
    ${n.note?`<div class="pnote">${esc(n.note)}</div>`:''}`;
  if(!n.verified) h+=`<div class="pending">ยังไม่ได้ไล่ตรวจ false-positive ราย check นี้ — logic ด้านล่างคือสิ่งที่ทำไว้/เสนอ รอยืนยัน</div>`;
  if(n.what) h+=`<div class="k">ตรวจอะไร · What</div><div class="body">${esc(n.what)}</div>`;
  if(n.why) h+=`<div class="k">ทำไมต้องตรวจ</div><div class="body mut">${esc(n.why)}</div>`;
  if(n.how) h+=`<div class="k">ตรวจอย่างไร · How${pend}</div><ol class="steps">${n.how.map(s=>`<li>${esc(s)}</li>`).join('')}</ol>`;
  if(n.rule) h+=`<div class="k">กฎการตัดสิน · Decision Rule${pend}</div>${n.rule.map(s=>`<div class="rule">${esc(s)}</div>`).join('')}`;
  if(!n.how&&!n.rule&&n.what) h+=`<div class="pending">ยังไม่ได้เขียน workflow/decision ละเอียด — แสดง What + อ้างอิง (เติมตอนไล่ตรวจ)</div>`;
  h+=`<div class="k">มาตรฐานอ้างอิง</div><div class="reflist">${refs}</div>`;
  if(n.conf!=null||n.tier!=null) h+=`<div class="k">Confidence</div><div class="body">${n.conf!=null?n.conf+'%':'—'}${n.tier?` · Tier ${n.tier}`:''}</div>`;
  paint(h);
}
function paint(h){const p=document.getElementById('panel');p.innerHTML=h;p.classList.remove('fade');void p.offsetWidth;p.classList.add('fade');}
</script>
</body>
</html>
