<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ตรรกะการตรวจ — Skill Knowledge Graph</title>
<style>
  :root{
    --bg:#ffffff; --border:#ececee; --border2:#e2e2e6; --text:#111827; --mut:#6b7280; --faint:#9ca3af;
    --chip-bg:#f4f4f5; --chip-tx:#71717a; --hover:#fafafa; --ink:#111; --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:'Inter','Noto Sans Thai',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
  .app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
  header{flex:none;padding:24px 30px 18px;border-bottom:1px solid var(--border)}
  header h1{font-size:25px;font-weight:700;letter-spacing:-.3px}
  header .sub{font-size:13.5px;color:var(--mut);margin-top:4px;max-width:820px}
  .board{flex:1;display:flex;min-height:0}
  .graph{flex:1;position:relative;min-width:0;background:#fcfcfd}
  #svg{position:absolute;inset:0;width:100%;height:100%;cursor:grab}
  .loading{position:absolute;inset:0;display:grid;place-items:center;color:var(--mut);font-size:13px}
  .legend{position:absolute;left:18px;bottom:16px;background:rgba(255,255,255,.9);backdrop-filter:blur(4px);border:1px solid var(--border);border-radius:12px;padding:9px 13px;display:flex;flex-wrap:wrap;gap:5px 15px;font-size:11.5px;color:var(--mut);max-width:min(640px,74%)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .legend i{width:9px;height:9px;border-radius:50%;flex:none}
  .legend i.sq{border-radius:2px;background:#475569}
  .legend i.dash{width:16px;height:0;border-radius:0;border-top:1.6px dashed var(--ink)}
  .legend .sep{flex-basis:100%;height:0;gap:0}
  .rail{width:392px;flex:none;background:var(--bg);border-left:1px solid var(--border);overflow-y:auto;padding:24px}
  .back{appearance:none;background:none;border:0;color:var(--mut);font:inherit;font-size:12.5px;cursor:pointer;padding:0;margin-bottom:16px}
  .back:hover{color:var(--text)}
  .crumb{font-size:11.5px;color:var(--faint);margin-bottom:3px}
  .pname{font-size:20px;font-weight:700;letter-spacing:-.2px;line-height:1.2}
  .pmeta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:10px 0 2px}
  .pill{font-size:11px;font-weight:600;padding:2px 11px;border-radius:99px}
  .pill.ok{background:var(--ink);color:#fff} .pill.todo{background:var(--chip-bg);color:var(--chip-tx)} .pill.dep{background:#1f2937;color:#fff} .pill.ent{background:var(--chip-bg);color:var(--chip-tx)}
  .cat{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--chip-tx);background:var(--chip-bg);padding:3px 11px;border-radius:99px}
  .cat i{width:8px;height:8px;border-radius:50%}
  .pnote{font-size:12px;color:var(--mut);margin-top:2px}
  .k{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);font-weight:700;margin:18px 0 7px}
  .body{font-size:13.5px;line-height:1.68}.body.mut{color:var(--mut);font-size:12.8px}
  ol.steps{list-style:none;counter-reset:s}ol.steps li{counter-increment:s;position:relative;padding:4px 0 4px 30px;font-size:13px}
  ol.steps li::before{content:counter(s);position:absolute;left:0;top:3px;width:20px;height:20px;border-radius:50%;background:var(--ink);color:#fff;font-weight:600;font-size:11px;display:grid;place-items:center}
  .rule{background:var(--hover);border:1px solid var(--border);border-radius:9px;padding:9px 12px;font-family:var(--mono);font-size:12px;color:var(--text);margin:6px 0;white-space:pre-wrap;line-height:1.55}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{display:inline-block;border-radius:8px;padding:3px 10px;font-size:12px;border:1px solid transparent}
  a.chip{cursor:pointer;text-decoration:none;background:color-mix(in srgb,var(--c,#a1a1aa) 10%,#fff);border-color:color-mix(in srgb,var(--c,#a1a1aa) 22%,#fff);color:#3f3f46}
  a.chip:hover{background:color-mix(in srgb,var(--c,#a1a1aa) 18%,#fff);border-color:var(--c,#a1a1aa);color:#111}
  a.chip.ver{background:var(--ink);border-color:var(--ink);color:#fff}
  a.chip.dep{background:#1f2937;border-color:#1f2937;color:#fff}
  .catdot{width:9px;height:9px;border-radius:50%;flex:none;display:inline-block}
  .grp{margin:13px 0}.grp-h{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .grp-nm{font-size:12.5px;font-weight:600;color:var(--text)}
  .reflist a{display:block;color:var(--text);text-decoration:underline;text-decoration-color:var(--border2);text-underline-offset:2px;font-size:12.8px;padding:3px 0}
  .reflist a:hover{text-decoration-color:var(--ink)}
  .pending{background:var(--hover);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:12.3px;color:var(--mut);margin:11px 0}
  .ban{display:flex;align-items:baseline;gap:10px;margin:14px 0 0}.ban .v{font-size:30px;font-weight:700;letter-spacing:-1px}.ban .l{font-size:12.5px;color:var(--mut)}
  .progress{height:6px;border-radius:99px;background:#f1f1f3;overflow:hidden;margin:10px 0 2px}.progress i{display:block;height:100%;background:var(--ink)}
  .fade{animation:fade .22s cubic-bezier(.22,1,.36,1)}@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion: reduce){.fade{animation:none}}
  @media(max-width:820px){.board{flex-direction:column}.graph{height:54vh;flex:none}.rail{width:auto;border-left:0;border-top:1px solid var(--border)}}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>ตรรกะการตรวจ</h1>
    <p class="sub">Knowledge Graph 3 ชั้น — หมวด → กลุ่ม (entity เช่น H1/Title) → กฎ (rule) · คลิกดู What · How · Decision Rule · Final URL/Canonical/Language/Page Type เป็น <b>dependency</b> ของกฎ ไม่ใช่ลูก</p>
  </header>
  <div class="board">
    <section class="graph">
      <div class="loading" id="loading">กำลังโหลดกราฟ…</div>
      <svg id="svg" style="display:none"></svg>
      <div class="legend" id="legend"></div>
    </section>
    <aside class="rail" id="panel"></aside>
  </div>
</div>
<script>
if(window.self!==window.top)document.documentElement.classList.add('embed');
const esc=s=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
let DATA,POS={},COLOR={},BYID={};
fetch('/skill-graph.json').then(r=>r.json()).then(d=>{DATA=d;d.cats.forEach(c=>COLOR[c.key]=c.color);d.nodes.forEach(n=>BYID[n.id]=n);init();}).catch(()=>{document.getElementById('loading').textContent='โหลดกราฟไม่สำเร็จ';});

function layout(nodes,edges,W,H){
  const keys=[...new Set(nodes.filter(n=>n.cat).map(n=>n.cat))];
  const anchor={};
  keys.forEach((k,i)=>{const a=i/keys.length*2*Math.PI-Math.PI/2;anchor[k]={x:W/2+Math.cos(a)*W*0.32,y:H/2+Math.sin(a)*H*0.34};});
  const center={x:W/2,y:H/2};
  nodes.forEach((n,i)=>{const a=n.cat?anchor[n.cat]:center;n.x=a.x+Math.cos(i*2.399)*44;n.y=a.y+Math.sin(i*2.399)*44;n.vx=n.vy=0;});
  const map=Object.fromEntries(nodes.map(n=>[n.id,n]));
  const E=edges.map(e=>[map[e[0]],map[e[1]],e[2]]).filter(e=>e[0]&&e[1]);
  for(let it=0;it<420;it++){const cool=1-it/520;
    for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){const a=nodes[i],b=nodes[j];let dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy||1,d=Math.sqrt(d2);const rep=1500/d2,fx=dx/d*rep,fy=dy/d*rep;a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;}
    for(const[a,b,dep]of E){let dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1;const ideal=dep?120:54;const f=(d-ideal)*(dep?0.006:0.03),fx=dx/d*f,fy=dy/d*f;a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;}
    for(const n of nodes){const a=n.cat?anchor[n.cat]:center;const g=n.type==='dep'?0.004:0.012;n.vx+=(a.x-n.x)*g;n.vy+=(a.y-n.y)*g;}
    for(const n of nodes){n.x+=Math.max(-9,Math.min(9,n.vx*0.85*cool));n.y+=Math.max(-9,Math.min(9,n.vy*0.85*cool));n.vx*=0.55;n.vy*=0.55;}
  }
}
function init(){
  const W=1000,H=720; layout(DATA.nodes,DATA.edges,W,H);
  const map=BYID;
  let a=1e9,b=1e9,c=-1e9,e=-1e9;
  DATA.nodes.forEach(n=>{a=Math.min(a,n.x);b=Math.min(b,n.y);c=Math.max(c,n.x);e=Math.max(e,n.y);});
  const pad=50;
  const rOf=n=>n.type==='root'?13:n.type==='cat'?10:n.type==='entity'?7:n.type==='dep'?8:(n.verified?7.5:3.2);
  const fillOf=n=>n.type==='root'?'#111':n.type==='dep'?'#475569':(n.verified||n.type==='cat'||n.type==='entity'?(COLOR[n.cat]||'#94a3b8'):(COLOR[n.cat]||'#c4ccd8'));
  const opOf=n=>(n.type==='rule'&&!n.verified)?.4:1;
  DATA.nodes.forEach(n=>POS[n.id]={x:n.x,y:n.y,r:rOf(n)});
  const edgesH=DATA.edges.map(g=>{const x=map[g[0]],y=map[g[1]];if(!x||!y)return'';const dep=g[2]==='dep';return `<line x1="${x.x.toFixed(1)}" y1="${x.y.toFixed(1)}" x2="${y.x.toFixed(1)}" y2="${y.y.toFixed(1)}" stroke="${dep?'#111':'#e4e4e7'}" stroke-width="${dep?1.4:.9}" ${dep?'stroke-dasharray="3 3" stroke-opacity=".7"':''}/>`;}).join('');
  const nodesH=DATA.nodes.map(n=>{
    const r=rOf(n),show=n.type!=='rule'||n.verified;
    const lblCls=n.type==='cat'?'hub':n.type==='entity'?'ent':n.type==='dep'?'dep':'';
    const lbl=show?`<text class="lbl ${lblCls}" x="${n.x.toFixed(1)}" y="${(n.y-r-6).toFixed(1)}" text-anchor="middle">${esc(n.label)}</text>`:'';
    const clk=n.type==='rule'||n.type==='entity'||n.type==='dep';
    const shape=n.type==='dep'
      ? `<rect id="c-${esc(n.id)}" x="${(n.x-r).toFixed(1)}" y="${(n.y-r).toFixed(1)}" width="${(r*2).toFixed(1)}" height="${(r*2).toFixed(1)}" rx="2.5" fill="${fillOf(n)}" stroke="#fff" stroke-width="1.4"/>`
      : `<circle id="c-${esc(n.id)}" cx="${n.x.toFixed(1)}" cy="${n.y.toFixed(1)}" r="${r}" fill="${fillOf(n)}" fill-opacity="${opOf(n)}" stroke="#fff" stroke-width="1.3"/>`;
    return `<g class="gnode" ${clk?`onclick="sel('${n.id}')" style="cursor:pointer"`:''}><title>${esc(n.label)}${n.type==='rule'?(n.verified?' — ยืนยันแล้ว':' — รอตรวจ'):n.type==='dep'?' — dependency':''}</title>${shape}${lbl}</g>`;
  }).join('');
  const svg=document.getElementById('svg');
  svg.setAttribute('viewBox',`${a-pad} ${b-pad} ${c-a+pad*2} ${e-b+pad*2}`);
  svg.setAttribute('preserveAspectRatio','xMidYMid meet');
  svg.innerHTML=`<defs><style>.lbl{font-family:'Inter','Noto Sans Thai',sans-serif;font-size:10px;fill:#52525b;paint-order:stroke;stroke:#fcfcfd;stroke-width:3px;stroke-linejoin:round}.lbl.hub{font-size:13px;font-weight:700;fill:#111}.lbl.ent{font-size:11px;font-weight:600;fill:#1f2937}.lbl.dep{font-size:11px;font-weight:700;fill:#1f2937}.gnode circle{transition:r .12s ease-out}</style></defs><circle id="selring" r="0" fill="none" stroke="#111" stroke-width="1.5" opacity="0"/><g>${edgesH}</g><g>${nodesH}</g>`;
  document.getElementById('loading').style.display='none'; svg.style.display='block';
  document.getElementById('legend').innerHTML=DATA.cats.map(c=>`<span><i style="background:${c.color}"></i>${esc(c.label)}</span>`).join('')
    +`<span class="sep"></span><span>ใหญ่=หมวด · กลาง=กลุ่ม(entity) · เล็ก=กฎ (ทึบ=ยืนยัน · จาง=รอตรวจ)</span><span><i class="sq"></i>dependency</span><span><i class="dash"></i>depends_on</span>`;
  summary();
}
function setSel(id){const p=POS[id],r=document.getElementById('selring');if(!r)return;if(p){r.setAttribute('cx',p.x);r.setAttribute('cy',p.y);r.setAttribute('r',p.r+5);r.setAttribute('opacity','1');}else r.setAttribute('opacity','0');}
function summary(){
  setSel(null);
  const rules=DATA.nodes.filter(n=>n.type==='rule');
  const ver=rules.filter(n=>n.verified),todo=rules.filter(n=>!n.verified);
  const pct=Math.round(ver.length/rules.length*100);
  // group backlog ตาม entity (ตอบ "กลุ่มนี้มี rule อะไร")
  const ents=DATA.nodes.filter(n=>n.type==='entity');
  let h=`<div class="pname">สถานะการยืนยัน</div>
    <div class="ban"><span class="v">${ver.length}</span><span class="l">กฎที่ยืนยันความถูกต้องแล้ว<br>(deep-review + เว็บจริง)</span></div>
    <div class="progress"><i style="width:${pct}%"></i></div>
    <div class="body mut">จาก ${rules.length} กฎ — เหลือ ${todo.length} รอไล่ตรวจ false-positive · คลิก node (กลุ่ม/กฎ/dependency) เพื่อดูรายละเอียด</div>
    <div class="k">ยืนยันถูกต้องแล้ว</div><div class="chips">${ver.map(n=>`<a class="chip ver" onclick="sel('${esc(n.id)}')">${esc(n.label)}</a>`).join('')}</div>
    <div class="k">รอไล่ตรวจ — แยกตามกลุ่ม (entity)</div>`;
  for(const en of ents){
    const kids=todo.filter(n=>n.entity===en.id.replace('__ent_',''));
    if(!kids.length)continue;
    h+=`<div class="grp"><div class="grp-h"><span class="catdot" style="background:${COLOR[en.cat]||'#999'}"></span><a class="grp-nm" onclick="sel('${esc(en.id)}')" style="cursor:pointer">${esc(en.label)}</a><span class="body mut">${kids.length}</span></div><div class="chips">${kids.map(n=>`<a class="chip" style="--c:${COLOR[en.cat]||'#999'}" onclick="sel('${esc(n.id)}')">${esc(n.label)}</a>`).join('')}</div></div>`;
  }
  paint(h);
}
function sel(id){
  const n=BYID[id]; if(!n)return; setSel(id);
  if(n.type==='entity') return selEntity(n);
  if(n.type==='dep') return selDep(n);
  const cat=(DATA.cats||[]).find(x=>x.key===n.cat)||{label:n.cat,color:'#999'};
  const ent=BYID['__ent_'+n.entity];
  const pend=n.verified?'':' · เสนอ (รอ review)';
  const refs=(n.refs||[]).map(r=>`<a href="${esc(r[1])}" target="_blank" rel="noopener">${esc(r[0])}</a>`).join('')||'<span class="body mut">—</span>';
  const deps=DATA.edges.filter(e=>e[0]===id&&e[2]==='dep').map(e=>BYID[e[1]]).filter(Boolean);
  let h=`<button class="back" onclick="summary()">‹ ทั้งหมด</button>
    <div class="crumb">${esc(cat.label)} › ${esc(ent?ent.label:'')}</div>
    <div class="pname">${esc(n.label)}</div>
    <div class="pmeta"><span class="cat"><i style="background:${cat.color}"></i>${esc(cat.label)}</span><span class="pill ${n.verified?'ok':'todo'}">${n.verified?'ยืนยันถูกต้องแล้ว':'รอตรวจสอบ'}</span></div>
    ${n.note?`<div class="pnote">${esc(n.note)}</div>`:''}`;
  if(!n.verified) h+=`<div class="pending">ยังไม่ได้ไล่ตรวจ false-positive ราย check นี้ — logic ด้านล่างคือสิ่งที่ทำไว้/เสนอ รอยืนยัน</div>`;
  if(n.what) h+=`<div class="k">ตรวจอะไร · What</div><div class="body">${esc(n.what)}</div>`;
  if(n.why) h+=`<div class="k">ทำไมต้องตรวจ</div><div class="body mut">${esc(n.why)}</div>`;
  if(n.how) h+=`<div class="k">ตรวจอย่างไร · How${pend}</div><ol class="steps">${n.how.map(s=>`<li>${esc(s)}</li>`).join('')}</ol>`;
  if(n.rule) h+=`<div class="k">กฎการตัดสิน · Decision Rule${pend}</div>${n.rule.map(s=>`<div class="rule">${esc(s)}</div>`).join('')}`;
  if(!n.how&&!n.rule&&n.what) h+=`<div class="pending">ยังไม่ได้เขียน workflow/decision ละเอียด — แสดง What + อ้างอิง (เติมตอนไล่ตรวจ)</div>`;
  if(deps.length) h+=`<div class="k">Dependencies (ต้องผ่านก่อน)</div><div class="chips">${deps.map(d=>`<a class="chip dep" onclick="sel('${esc(d.id)}')">${esc(d.label)}</a>`).join('')}</div>`;
  h+=`<div class="k">มาตรฐานอ้างอิง</div><div class="reflist">${refs}</div>`;
  if(n.conf!=null||n.tier!=null) h+=`<div class="k">Confidence</div><div class="body">${n.conf!=null?n.conf+'%':'—'}${n.tier?` · Tier ${n.tier}`:''}</div>`;
  paint(h);
}
function selEntity(n){
  const cat=(DATA.cats||[]).find(x=>x.key===n.cat)||{label:n.cat,color:'#999'};
  const kids=DATA.nodes.filter(r=>r.type==='rule'&&r.entity===n.id.replace('__ent_',''));
  const v=kids.filter(k=>k.verified).length;
  let h=`<button class="back" onclick="summary()">‹ ทั้งหมด</button>
    <div class="crumb">${esc(cat.label)} › กลุ่ม (entity)</div>
    <div class="pname">${esc(n.label)}</div>
    <div class="pmeta"><span class="cat"><i style="background:${cat.color}"></i>${esc(cat.label)}</span><span class="pill ent">กลุ่ม · ${kids.length} กฎ (${v} ยืนยัน)</span></div>
    <div class="k">กฎทั้งหมดในกลุ่มนี้</div><div class="chips">${kids.map(k=>`<a class="chip ${k.verified?'ver':''}" style="--c:${cat.color}" onclick="sel('${esc(k.id)}')">${esc(k.label)}</a>`).join('')}</div>
    <div class="body mut" style="margin-top:14px">คลิกกฎเพื่อดู What / How / Decision Rule + dependencies</div>`;
  paint(h);
}
function selDep(n){
  const usedBy=DATA.edges.filter(e=>e[2]==='dep'&&e[1]===n.id).map(e=>BYID[e[0]]).filter(Boolean);
  const refs=(n.refs||[]).map(r=>`<a href="${esc(r[1])}" target="_blank" rel="noopener">${esc(r[0])}</a>`).join('')||'<span class="body mut">—</span>';
  let h=`<button class="back" onclick="summary()">‹ ทั้งหมด</button>
    <div class="crumb">Dependency (input ของกฎ — ไม่ใช่กฎ)</div>
    <div class="pname">${esc(n.label)}</div>
    <div class="pmeta"><span class="pill dep">dependency</span>${n.verified?`<span class="pill ok">ยืนยันแล้ว</span>`:''}</div>
    ${n.note?`<div class="pnote">${esc(n.note)}</div>`:''}`;
  if(n.what) h+=`<div class="k">คืออะไร</div><div class="body">${esc(n.what)}</div>`;
  if(n.how) h+=`<div class="k">ทำงานอย่างไร</div><ol class="steps">${n.how.map(s=>`<li>${esc(s)}</li>`).join('')}</ol>`;
  if(n.rule) h+=`<div class="k">กฎ</div>${n.rule.map(s=>`<div class="rule">${esc(s)}</div>`).join('')}`;
  h+=`<div class="k">เป็น dependency ของกฎ</div><div class="chips">${usedBy.map(r=>`<a class="chip ${r.verified?'ver':''}" style="--c:${COLOR[r.cat]||'#999'}" onclick="sel('${esc(r.id)}')">${esc(r.label)}</a>`).join('')||'—'}</div>`;
  if((n.refs||[]).length) h+=`<div class="k">มาตรฐานอ้างอิง</div><div class="reflist">${refs}</div>`;
  paint(h);
}
function paint(h){const p=document.getElementById('panel');p.innerHTML=h;p.classList.remove('fade');void p.offsetWidth;p.classList.add('fade');}
</script>
</body>
</html>
