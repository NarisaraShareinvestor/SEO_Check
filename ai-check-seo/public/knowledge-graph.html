<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ตรรกะการตรวจ — Skill Knowledge Graph</title>
<style>
  :root{
    --ink:#16203a; --blue:#1b4dd8; --navy:#0f1e3d; --mut:#667085;
    --line:#e5e8ee; --line2:#eef1f6; --paper:#fff; --faint:#f7f9fc; --board:#eef0f4;
    --ok:#15803d; --serif:"Georgia","Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Arial,"Sarabun",sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--board);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
  .app{height:100vh;display:flex;flex-direction:column;overflow:hidden}

  /* cover */
  .cover{background:var(--navy);color:#fff;padding:16px clamp(20px,4vw,40px) 18px;flex:none}
  .eyebrow{font-size:10.5px;letter-spacing:.3em;text-transform:uppercase;color:#9db4e8;font-weight:700}
  .cover h1{font-family:var(--serif);font-weight:700;font-size:clamp(21px,3.2vw,30px);line-height:1.05;letter-spacing:-.4px;margin:7px 0 0}
  .cover .lead{max-width:760px;color:#c3cee2;font-size:13px;margin:7px 0 0}

  /* board */
  .board{flex:1;display:flex;min-height:0}
  .graph{flex:1;position:relative;min-width:0;background:radial-gradient(120% 120% at 50% 38%,#fbfcfe 0%,#eef1f6 100%)}
  #svg{position:absolute;inset:0;width:100%;height:100%;cursor:grab}
  .loading{position:absolute;inset:0;display:grid;place-items:center;color:var(--mut);font-size:13px}
  .legend{position:absolute;left:16px;bottom:14px;background:rgba(255,255,255,.86);backdrop-filter:blur(6px);border:1px solid var(--line);border-radius:10px;padding:9px 12px;display:flex;flex-wrap:wrap;gap:5px 13px;max-width:min(560px,72%);font-size:11px;color:var(--mut);box-shadow:0 4px 18px rgba(16,30,61,.08)}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .legend i{width:9px;height:9px;border-radius:50%;flex:none}
  .legend .sep{width:100%;height:0}

  /* rail */
  .rail{width:392px;flex:none;background:var(--paper);border-left:1px solid var(--line);overflow-y:auto;padding:22px 24px}
  .back{appearance:none;background:none;border:0;color:var(--blue);font:inherit;font-size:12.5px;cursor:pointer;padding:0;margin-bottom:14px}
  .back:hover{text-decoration:underline}
  .pname{font-family:var(--serif);font-weight:700;font-size:21px;line-height:1.15;letter-spacing:-.3px;margin:0}
  .pmeta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:9px 0 4px}
  .pill{font-size:11px;font-weight:700;padding:2px 10px;border-radius:100px}
  .pill.ok{background:#e7f2ec;color:var(--ok)} .pill.todo{background:var(--line2);color:var(--mut)}
  .cat{font-size:11px;font-weight:600;color:#fff;padding:2px 10px;border-radius:100px}
  .pnote{font-size:12px;color:var(--mut)}
  .k{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);font-weight:700;margin:18px 0 6px}
  .body{font-size:13.5px;line-height:1.66}
  .body.mut{color:var(--mut);font-size:12.8px}
  ol.steps{margin:0;padding-left:0;list-style:none;counter-reset:s}
  ol.steps li{counter-increment:s;position:relative;padding:3px 0 3px 30px;font-size:13px}
  ol.steps li::before{content:counter(s);position:absolute;left:0;top:2px;width:20px;height:20px;border-radius:50%;background:var(--navy);color:#fff;font-family:var(--serif);font-weight:700;font-size:11px;display:grid;place-items:center}
  .rule{background:var(--faint);border:1px solid var(--line);border-radius:7px;padding:8px 11px;font-family:var(--mono);font-size:12px;color:var(--navy);margin:5px 0;white-space:pre-wrap;line-height:1.5}
  .chips{display:flex;flex-wrap:wrap;gap:5px}
  .chip{display:inline-block;background:var(--faint);border:1px solid var(--line);color:#33404f;border-radius:6px;padding:2px 9px;font-size:12px;cursor:default}
  a.chip{cursor:pointer;color:var(--ink);text-decoration:none}
  a.chip:hover{border-color:var(--blue);color:var(--blue)}
  .reflist a{display:block;color:var(--blue);text-decoration:none;font-size:12.8px;padding:2px 0}
  .reflist a:hover{text-decoration:underline}
  .pending{background:var(--faint);border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:12.3px;color:var(--mut);margin:10px 0}
  .ban{display:flex;align-items:baseline;gap:9px;margin:5px 0}
  .ban .v{font-family:var(--serif);font-weight:700;font-size:20px;color:var(--navy)} .ban .l{font-size:12px;color:var(--mut)}
  .progress{height:5px;border-radius:3px;background:var(--line2);overflow:hidden;margin:8px 0 2px}
  .progress i{display:block;height:100%;background:var(--ok)}
  .grp{margin:11px 0}
  .grp-h{display:flex;align-items:center;gap:7px;margin-bottom:5px}
  .fade{animation:fade .22s ease-out}
  @keyframes fade{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion: reduce){ .fade{animation:none} }
  @media(max-width:820px){ .board{flex-direction:column} .graph{height:54vh;flex:none} .rail{width:auto;border-left:0;border-top:1px solid var(--line)} }
</style>
</head>
<body>
<div class="app">
  <header class="cover">
    <div class="eyebrow">กราฟ A — Skill / Audit Knowledge Graph</div>
    <h1>ตรรกะการตรวจ</h1>
    <p class="lead">ทุก check คือ node — คลิกเพื่อดูว่าตรวจอะไร (What), อย่างไร (How), ตัดสินด้วยกฎใด (Decision Rule) พร้อมหลักฐานและมาตรฐานอ้างอิง · Final URL คือ node กลางที่ duplicate/canonical ต้องผ่านก่อน</p>
  </header>
  <div class="board">
    <section class="graph">
      <div class="loading" id="loading">กำลังโหลดกราฟ…</div>
      <svg id="svg" style="display:none"></svg>
      <div class="legend" id="legend"></div>
    </section>
    <aside class="rail" id="panel"></aside>
  </div>
</div>
<script>
if(window.self!==window.top)document.documentElement.classList.add('embed');
const esc=s=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
let DATA,COLOR={};
fetch('/skill-graph.json').then(r=>r.json()).then(d=>{DATA=d;d.cats.forEach(c=>COLOR[c.key]=c.color);COLOR.root='#0f1e3d';init();})
  .catch(()=>{document.getElementById('loading').textContent='โหลดกราฟไม่สำเร็จ';});

function layout(nodes,edges,W,H){
  const keys=[...new Set(nodes.map(n=>n.cat))].filter(k=>k!=='root');
  const anchor={root:{x:W/2,y:H/2}};
  keys.forEach((k,i)=>{const a=i/keys.length*2*Math.PI-Math.PI/2;anchor[k]={x:W/2+Math.cos(a)*W*0.31,y:H/2+Math.sin(a)*H*0.33};});
  if(anchor.urlnorm)anchor.urlnorm={x:W/2,y:H*0.41};
  nodes.forEach((n,i)=>{const a=anchor[n.cat]||anchor.root;n.x=a.x+Math.cos(i*2.399)*46;n.y=a.y+Math.sin(i*2.399)*46;n.vx=n.vy=0;});
  const map=Object.fromEntries(nodes.map(n=>[n.id,n]));
  const E=edges.map(e=>[map[e[0]],map[e[1]]]).filter(e=>e[0]&&e[1]);
  for(let it=0;it<360;it++){const cool=1-it/450;
    for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){const a=nodes[i],b=nodes[j];let dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy||1,d=Math.sqrt(d2);const rep=1600/d2,fx=dx/d*rep,fy=dy/d*rep;a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;}
    for(const[a,b]of E){let dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1;const f=(d-64)*0.02,fx=dx/d*f,fy=dy/d*f;a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;}
    for(const n of nodes){const a=anchor[n.cat]||anchor.root;n.vx+=(a.x-n.x)*0.013;n.vy+=(a.y-n.y)*0.013;}
    for(const n of nodes){n.x+=Math.max(-9,Math.min(9,n.vx*0.85*cool));n.y+=Math.max(-9,Math.min(9,n.vy*0.85*cool));n.vx*=0.55;n.vy*=0.55;}
  }
}
function init(){
  const W=940,H=680; layout(DATA.nodes,DATA.edges,W,H);
  const map=Object.fromEntries(DATA.nodes.map(n=>[n.id,n]));
  let a=1e9,b=1e9,c=-1e9,e=-1e9;
  DATA.nodes.forEach(n=>{a=Math.min(a,n.x);b=Math.min(b,n.y);c=Math.max(c,n.x);e=Math.max(e,n.y);});
  const pad=46;
  const rOf=n=>n.id==='__root'?12:n.hub?9:(n.verified?8:3.4);
  const edgesH=DATA.edges.map(g=>{const x=map[g[0]],y=map[g[1]];if(!x||!y)return'';const dep=g[2]==='dep';return `<line x1="${x.x.toFixed(1)}" y1="${x.y.toFixed(1)}" x2="${y.x.toFixed(1)}" y2="${y.y.toFixed(1)}" stroke="${dep?'#1b4dd8':'#dde2ea'}" stroke-width="${dep?1.6:.9}" ${dep?'stroke-dasharray="3 3" stroke-opacity=".8"':'stroke-opacity=".75"'}/>`;}).join('');
  const nodesH=DATA.nodes.map(n=>{
    const isHub=n.hub||n.id==='__root';
    const fill=isHub?(COLOR[n.cat]||'#94a3b8'):(n.verified?(COLOR[n.cat]||'#94a3b8'):'#c4ccd8');
    const op=isHub?1:(n.verified?1:.5);
    const r=rOf(n);
    const ring=n.verified&&!isHub?`<circle cx="${n.x.toFixed(1)}" cy="${n.y.toFixed(1)}" r="${r+3.5}" fill="none" stroke="#0f1e3d" stroke-width="1.4" stroke-opacity=".85"/>`:'';
    const show=isHub||n.verified;
    const lbl=show?`<text class="lbl ${isHub?'hub':'ver'}" x="${n.x.toFixed(1)}" y="${(n.y-r-6).toFixed(1)}" text-anchor="middle">${esc(n.label)}</text>`:'';
    const clk=!String(n.id).startsWith('__');
    return `<g class="gnode" ${clk?`onclick="sel('${n.id}')" style="cursor:pointer"`:''}><title>${esc(n.label)}${n.verified?' — ยืนยันแล้ว':String(n.id).startsWith('__')?'':' — รอตรวจ'}</title>${ring}<circle id="c-${esc(n.id)}" cx="${n.x.toFixed(1)}" cy="${n.y.toFixed(1)}" r="${r}" fill="${fill}" fill-opacity="${op}" stroke="#fff" stroke-width="1.2"/>${lbl}</g>`;
  }).join('');
  const svg=document.getElementById('svg');
  svg.setAttribute('viewBox',`${a-pad} ${b-pad} ${c-a+pad*2} ${e-b+pad*2}`);
  svg.setAttribute('preserveAspectRatio','xMidYMid meet');
  svg.innerHTML=`<defs><style>.lbl{font-family:var(--serif);fill:#16203a;paint-order:stroke;stroke:#fbfcfe;stroke-width:3px;stroke-linejoin:round}.lbl.hub{font-size:12px;font-weight:700;fill:#0f1e3d}.lbl.ver{font-size:11px;font-weight:700}.gnode circle{transition:r .12s ease-out}.gnode:hover circle{r:9}</style></defs><g>${edgesH}</g><g>${nodesH}</g>`;
  document.getElementById('loading').style.display='none'; svg.style.display='block';
  document.getElementById('legend').innerHTML=DATA.cats.map(c=>`<span><i style="background:${c.color}"></i>${esc(c.label)}</span>`).join('')
    +`<span class="sep"></span><span><i style="background:#1b4dd8"></i>เส้นประ = dependency (Final URL)</span><span>● ทึบ = ยืนยันแล้ว · ○ จาง = รอตรวจ</span>`;
  summary();
}
function setSel(id){document.querySelectorAll('#svg .gnode circle[id]').forEach(c=>{c.setAttribute('stroke','#fff');c.setAttribute('stroke-width','1.2');});const c=document.getElementById('c-'+id);if(c){c.setAttribute('stroke','#1b4dd8');c.setAttribute('stroke-width','2.6');}}
function summary(){
  setSel('__none__');
  const checks=DATA.nodes.filter(n=>!String(n.id).startsWith('__'));
  const ver=checks.filter(n=>n.verified),todo=checks.filter(n=>!n.verified);
  const pct=Math.round(ver.length/checks.length*100);
  const byCat={};todo.forEach(n=>{(byCat[n.cat]=byCat[n.cat]||[]).push(n);});
  let h=`<div class="pname">สถานะการยืนยัน</div>
    <div class="ban" style="margin-top:12px"><span class="v">${ver.length}</span><span class="l">ยืนยันความถูกต้องแล้ว (review + เว็บจริง)</span></div>
    <div class="progress"><i style="width:${pct}%"></i></div>
    <div class="body mut">เหลือ ${todo.length} รายการที่ทำงานอยู่แต่ยังไม่ deep-review false-positive — ไล่ตรวจทีละตัว (คลิกชื่อเพื่อดู logic ที่เสนอ)</div>
    <div class="k">ยืนยันถูกต้องแล้ว</div><div class="chips">${ver.map(n=>`<a class="chip" onclick="sel('${esc(n.id)}')" style="border-color:#bfe0cb;color:${'#15803d'}">${esc(n.label)}</a>`).join('')}</div>
    <div class="k">รอไล่ตรวจ (${todo.length})</div>`;
  for(const ct of DATA.cats){const arr=byCat[ct.key];if(!arr||!arr.length)continue;
    h+=`<div class="grp"><div class="grp-h"><span class="cat" style="background:${ct.color}">${esc(ct.label)}</span><span class="body mut">${arr.length}</span></div><div class="chips">${arr.map(n=>`<a class="chip" onclick="sel('${esc(n.id)}')">${esc(n.label)}</a>`).join('')}</div></div>`;}
  const p=document.getElementById('panel'); p.innerHTML=h; p.classList.remove('fade');void p.offsetWidth;p.classList.add('fade');
}
function sel(id){
  const n=(DATA.nodes||[]).find(x=>x.id===id); if(!n)return; setSel(id);
  const cat=(DATA.cats||[]).find(x=>x.key===n.cat)||{label:n.cat,color:'#667085'};
  const pend=n.verified?'':' · เสนอ (รอ review)';
  const refs=(n.refs||[]).map(r=>`<a href="${esc(r[1])}" target="_blank" rel="noopener">${esc(r[0])}</a>`).join('')||'<span class="body mut">—</span>';
  let h=`<button class="back" onclick="summary()">‹ ทั้งหมด</button>
    <div class="pname">${esc(n.label)}</div>
    <div class="pmeta"><span class="cat" style="background:${cat.color}">${esc(cat.label)}</span><span class="pill ${n.verified?'ok':'todo'}">${n.verified?'ยืนยันถูกต้องแล้ว':'รอตรวจสอบ'}</span></div>
    ${n.note?`<div class="pnote">${esc(n.note)}</div>`:''}`;
  if(!n.verified) h+=`<div class="pending">ยังไม่ได้ไล่ตรวจ false-positive ราย check นี้ — logic ด้านล่างคือสิ่งที่ทำไว้/เสนอ รอยืนยัน</div>`;
  if(n.what) h+=`<div class="k">ตรวจอะไร (What)</div><div class="body">${esc(n.what)}</div>`;
  if(n.why) h+=`<div class="k">ทำไมต้องตรวจ</div><div class="body mut">${esc(n.why)}</div>`;
  if(n.how) h+=`<div class="k">ตรวจอย่างไร (How)${pend}</div><ol class="steps">${n.how.map(s=>`<li>${esc(s)}</li>`).join('')}</ol>`;
  if(n.rule) h+=`<div class="k">กฎการตัดสิน (Decision Rule)${pend}</div>${n.rule.map(s=>`<div class="rule">${esc(s)}</div>`).join('')}`;
  if(!n.how&&!n.rule&&n.what) h+=`<div class="pending">ยังไม่ได้เขียน workflow/decision ละเอียด — แสดง What + อ้างอิง (เติมตอนไล่ตรวจ)</div>`;
  h+=`<div class="k">มาตรฐานอ้างอิง</div><div class="reflist">${refs}</div>`;
  if(n.conf!=null||n.tier!=null) h+=`<div class="k">Confidence</div><div class="body">${n.conf!=null?n.conf+'%':'—'}${n.tier?` · Tier ${n.tier}`:''}</div>`;
  const p=document.getElementById('panel'); p.innerHTML=h; p.classList.remove('fade');void p.offsetWidth;p.classList.add('fade');
}
</script>
</body>
</html>
