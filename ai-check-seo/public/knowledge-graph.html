<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ตรรกะการตรวจ — Skill Knowledge Graph</title>
<style>
  :root{--bg:#fff;--border:#ececee;--border2:#e2e2e6;--text:#111827;--mut:#6b7280;--faint:#9ca3af;--chip-bg:#f4f4f5;--chip-tx:#71717a;--hover:#fafafa;--ink:#111;--mono:ui-monospace,SFMono-Regular,Menlo,monospace;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:'Inter','Noto Sans Thai',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
  .app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
  header{flex:none;padding:22px 30px 16px;border-bottom:1px solid var(--border)}
  header h1{font-size:24px;font-weight:700;letter-spacing:-.3px}
  header .sub{font-size:13px;color:var(--mut);margin-top:3px;max-width:860px}
  .board{flex:1;display:flex;min-height:0}
  .graph{flex:1;position:relative;min-width:0;background:radial-gradient(120% 120% at 50% 40%,#fff,#f3f4f7);overflow:hidden}
  #svg{position:absolute;inset:0;width:100%;height:100%;cursor:grab;touch-action:none;user-select:none}
  #svg.panning{cursor:grabbing}
  .loading{position:absolute;inset:0;display:grid;place-items:center;color:var(--mut);font-size:13px}
  .gnode{cursor:pointer}
  .gnode text{font-family:'Inter','Noto Sans Thai',sans-serif;font-size:10px;fill:#52525b;paint-order:stroke;stroke:#fcfcfd;stroke-width:3px;stroke-linejoin:round;pointer-events:none;opacity:0;transition:opacity .12s}
  .gnode.lblOn text,.gnode:hover text,.gnode.sel text,.gnode.hl text{opacity:1}
  .gnode.lblCat text{font-size:13.5px;font-weight:700;fill:#111}
  .gnode.lblEnt text{font-size:11.5px;font-weight:600;fill:#1f2937}
  .gnode.lblDep text{font-size:11px;font-weight:700;fill:#1f2937}
  .gnode.dim{opacity:.18}
  line.edge{stroke:#dfe1e6;stroke-width:1;transition:stroke .12s,stroke-opacity .12s}
  line.edge.dep{stroke:#9aa3af;stroke-dasharray:3 3}
  line.edge.dim{stroke-opacity:.15}
  line.edge.hl{stroke:#111;stroke-width:1.6;stroke-opacity:1}
  .ctrls{position:absolute;right:14px;top:14px;display:flex;flex-direction:column;gap:6px}
  .ctrls button{width:32px;height:32px;border:1px solid var(--border2);background:#fff;border-radius:9px;font-size:16px;color:#3f3f46;cursor:pointer;display:grid;place-items:center;box-shadow:0 1px 3px rgba(16,30,61,.06)}
  .ctrls button:hover{background:var(--hover)}
  .legend{position:absolute;left:16px;bottom:14px;background:rgba(255,255,255,.92);backdrop-filter:blur(4px);border:1px solid var(--border);border-radius:12px;padding:9px 13px;display:flex;flex-wrap:wrap;gap:5px 14px;font-size:11px;color:var(--mut);max-width:min(620px,72%)}
  .legend span{display:inline-flex;align-items:center;gap:6px}.legend i{width:9px;height:9px;border-radius:50%;flex:none}
  .legend i.sq{border-radius:2px;background:#475569}.legend i.dash{width:15px;height:0;border-radius:0;border-top:1.5px dashed #9aa3af}.legend .sep{flex-basis:100%;height:0;gap:0}
  .hint{position:absolute;left:16px;top:14px;font-size:11.5px;color:var(--faint);background:rgba(255,255,255,.8);padding:4px 10px;border-radius:8px;border:1px solid var(--border)}
  .rail{width:392px;flex:none;background:var(--bg);border-left:1px solid var(--border);overflow-y:auto;padding:24px}
  .back{appearance:none;background:none;border:0;color:var(--mut);font:inherit;font-size:12.5px;cursor:pointer;padding:0;margin-bottom:16px}.back:hover{color:var(--text)}
  .crumb{font-size:11.5px;color:var(--faint);margin-bottom:3px}
  .pname{font-size:20px;font-weight:700;letter-spacing:-.2px;line-height:1.2}
  .pmeta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:10px 0 2px}
  .pill{font-size:11px;font-weight:600;padding:2px 11px;border-radius:99px}
  .pill.ok{background:var(--ink);color:#fff}.pill.todo{background:var(--chip-bg);color:var(--chip-tx)}.pill.dep{background:#1f2937;color:#fff}.pill.ent{background:var(--chip-bg);color:var(--chip-tx)}
  .cat{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--chip-tx);background:var(--chip-bg);padding:3px 11px;border-radius:99px}.cat i{width:8px;height:8px;border-radius:50%}
  .pnote{font-size:12px;color:var(--mut);margin-top:2px}
  .k{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);font-weight:700;margin:18px 0 7px}
  .body{font-size:13.5px;line-height:1.68}.body.mut{color:var(--mut);font-size:12.8px}
  ol.steps{list-style:none;counter-reset:s}ol.steps li{counter-increment:s;position:relative;padding:4px 0 4px 30px;font-size:13px}
  ol.steps li::before{content:counter(s);position:absolute;left:0;top:3px;width:20px;height:20px;border-radius:50%;background:var(--ink);color:#fff;font-weight:600;font-size:11px;display:grid;place-items:center}
  .rule{background:var(--hover);border:1px solid var(--border);border-radius:9px;padding:9px 12px;font-family:var(--mono);font-size:12px;color:var(--text);margin:6px 0;white-space:pre-wrap;line-height:1.55}
  .chips{display:flex;flex-wrap:wrap;gap:6px}.chip{display:inline-block;border-radius:8px;padding:3px 10px;font-size:12px;border:1px solid transparent}
  a.chip{cursor:pointer;text-decoration:none;background:color-mix(in srgb,var(--c,#a1a1aa) 10%,#fff);border-color:color-mix(in srgb,var(--c,#a1a1aa) 22%,#fff);color:#3f3f46}
  a.chip:hover{background:color-mix(in srgb,var(--c,#a1a1aa) 18%,#fff);border-color:var(--c,#a1a1aa);color:#111}
  a.chip.ver{background:var(--ink);border-color:var(--ink);color:#fff}a.chip.dep{background:#1f2937;border-color:#1f2937;color:#fff}
  .catdot{width:9px;height:9px;border-radius:50%;flex:none;display:inline-block}
  .grp{margin:13px 0}.grp-h{display:flex;align-items:center;gap:8px;margin-bottom:6px}.grp-nm{font-size:12.5px;font-weight:600;color:var(--text)}
  .reflist a{display:block;color:var(--text);text-decoration:underline;text-decoration-color:var(--border2);text-underline-offset:2px;font-size:12.8px;padding:3px 0}.reflist a:hover{text-decoration-color:var(--ink)}
  .pending{background:var(--hover);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:12.3px;color:var(--mut);margin:11px 0}
  .ban{display:flex;align-items:baseline;gap:10px;margin:14px 0 0}.ban .v{font-size:30px;font-weight:700;letter-spacing:-1px}.ban .l{font-size:12.5px;color:var(--mut)}
  .progress{height:6px;border-radius:99px;background:#f1f1f3;overflow:hidden;margin:10px 0 2px}.progress i{display:block;height:100%;background:var(--ink)}
  .fade{animation:fade .2s cubic-bezier(.22,1,.36,1)}@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
  @media(max-width:820px){.board{flex-direction:column}.graph{height:56vh;flex:none}.rail{width:auto;border-left:0;border-top:1px solid var(--border)}}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>ตรรกะการตรวจ</h1>
    <p class="sub">Knowledge Graph แบบโต้ตอบ — <b>ลากโหนด · ลากพื้นหลังเพื่อเลื่อน · สกรอลล์ซูม</b> · คลิกโหนดดูรายละเอียด + ไฮไลต์ความสัมพันธ์ · หมวด→กลุ่ม(entity)→กฎ · สี่เหลี่ยม=dependency</p>
  </header>
  <div class="board">
    <section class="graph" id="graph">
      <div class="loading" id="loading">กำลังโหลดกราฟ…</div>
      <svg id="svg" style="display:none"></svg>
      <div class="hint" id="hint">ลากโหนดเพื่อจัด · สกรอลล์ซูม · ลากพื้นที่ว่างเพื่อเลื่อน</div>
      <div class="ctrls"><button onclick="zoomBy(1.25)" title="ซูมเข้า">+</button><button onclick="zoomBy(0.8)" title="ซูมออก">−</button><button onclick="resetView()" title="รีเซ็ต">⊙</button></div>
      <div class="legend" id="legend"></div>
    </section>
    <aside class="rail" id="panel"></aside>
  </div>
</div>
<script>
if(window.self!==window.top)document.documentElement.classList.add('embed');
const NS='http://www.w3.org/2000/svg';
const esc=s=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
let DATA,BYID={},COLOR={},ENTVER={},NODES=[],LINKS=[],NBR={},CATANCHOR={},svg,vp,W=900,H=620;
let view={x:0,y:0,k:1},alpha=1,selId=null,raf=0;
const rOf=n=>n.type==='root'?15:n.type==='cat'?11:n.type==='entity'?8:n.type==='dep'?8:(n.verified?7:4.2);
const fillOf=n=>n.type==='root'?'#111':n.type==='dep'?'#475569':(n.verified||n.type==='cat'||n.type==='entity'?(COLOR[n.cat]||'#94a3b8'):(COLOR[n.cat]||'#cfd6e0'));

fetch('/skill-graph.json').then(r=>r.json()).then(d=>{
  DATA=d; d.cats.forEach(c=>COLOR[c.key]=c.color); d.nodes.forEach(n=>BYID[n.id]=n);
  d.nodes.filter(n=>n.type==='rule'&&n.verified).forEach(r=>{ENTVER['__ent_'+r.entity]=(ENTVER['__ent_'+r.entity]||0)+1;});
  build();
}).catch(()=>{document.getElementById('loading').textContent='โหลดกราฟไม่สำเร็จ';});

function build(){
  svg=document.getElementById('svg');
  const gr=document.getElementById('graph'); W=gr.clientWidth||900; H=gr.clientHeight||620;
  NODES=DATA.nodes; LINKS=DATA.edges.map(e=>({s:BYID[e[0]],t:BYID[e[1]],dep:e[2]==='dep'})).filter(l=>l.s&&l.t);
  // neighbor map (for highlight)
  NODES.forEach(n=>NBR[n.id]=new Set());
  LINKS.forEach(l=>{NBR[l.s.id].add(l.t.id);NBR[l.t.id].add(l.s.id);});
  // initial positions: cluster by category around center
  const catAng={}; DATA.cats.forEach((c,i)=>catAng[c.key]=i/DATA.cats.length*2*Math.PI);
  // per-category anchor on a ring → same-color nodes cluster around their own anchor
  const ringR=Math.min(W,H)*0.36; CATANCHOR={};
  DATA.cats.forEach(c=>{const a=catAng[c.key];CATANCHOR[c.key]={x:W/2+Math.cos(a)*ringR,y:H/2+Math.sin(a)*ringR};});
  NODES.forEach((n,i)=>{const base=n.cat!=null?catAng[n.cat]||0:0;const a=base+(i%7)*0.3;const rad=n.type==='root'?0:n.type==='dep'?60:n.type==='cat'?150:230+(i%5)*18;n.x=W/2+Math.cos(a)*rad;n.y=H/2+Math.sin(a)*rad;n.vx=0;n.vy=0;});
  const root=BYID['__root']; if(root){root.x=W/2;root.y=H/2;}
  buildDOM(); bindUI();
  document.getElementById('loading').style.display='none'; svg.style.display='block';
  document.getElementById('legend').innerHTML=DATA.cats.map(c=>`<span><i style="background:${c.color}"></i>${esc(c.label)}</span>`).join('')+`<span class="sep"></span><span><i class="sq"></i>dependency</span><span><i class="dash"></i>depends_on</span>`;
  alpha=1; loop(); summary();
}
function buildDOM(){
  svg.innerHTML='<g id="vp"><g id="eg"></g><g id="ng"></g></g>';
  vp=document.getElementById('vp'); const eg=document.getElementById('eg'),ng=document.getElementById('ng');
  LINKS.forEach(l=>{const ln=document.createElementNS(NS,'line');ln.setAttribute('class','edge'+(l.dep?' dep':''));l.el=ln;eg.appendChild(ln);});
  NODES.forEach(n=>{
    const g=document.createElementNS(NS,'g'); g.setAttribute('class','gnode'+(['root','cat','entity','dep'].includes(n.type)||n.verified?' lblOn':'')+(n.type==='cat'?' lblCat':n.type==='entity'?' lblEnt':n.type==='dep'?' lblDep':''));
    const r=rOf(n),hasVer=n.type==='entity'&&ENTVER[n.id];
    let shape;
    if(n.type==='dep'){shape=document.createElementNS(NS,'rect');shape.setAttribute('x',-r);shape.setAttribute('y',-r);shape.setAttribute('width',r*2);shape.setAttribute('height',r*2);shape.setAttribute('rx',2.5);}
    else{shape=document.createElementNS(NS,'circle');shape.setAttribute('r',r);}
    shape.setAttribute('fill',fillOf(n));shape.setAttribute('stroke',hasVer?'#111':'#fff');shape.setAttribute('stroke-width',hasVer?2:1.4);
    if(n.type==='rule'&&!n.verified)shape.setAttribute('fill-opacity','.55');
    const tx=document.createElementNS(NS,'text');tx.setAttribute('text-anchor','middle');tx.setAttribute('y',-r-5);tx.textContent=n.label+(hasVer?'  ✓'+ENTVER[n.id]:'');
    g.appendChild(shape);g.appendChild(tx);
    g.addEventListener('pointerdown',ev=>onNodeDown(ev,n));
    n.el=g; ng.appendChild(g);
  });
}
function loop(){
  if(alpha>0.005){ step(); alpha*=0.985; }
  render(); raf=requestAnimationFrame(loop);
}
function step(){
  const n=NODES.length;
  for(let i=0;i<n;i++){const a=NODES[i];if(a.fixed)continue;
    for(let j=i+1;j<n;j++){const b=NODES[j];let dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy||1;if(d2<90000){const d=Math.sqrt(d2),f=4600/d2,fx=dx/d*f,fy=dy/d*f;a.vx+=fx;a.vy+=fy;if(!b.fixed){b.vx-=fx;b.vy-=fy;}}}
  }
  for(const l of LINKS){const a=l.s,b=l.t;let dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1;const ideal=l.dep?190:(b.type==='rule'||a.type==='rule')?64:(a.type==='root'||b.type==='root')?160:120;const f=(d-ideal)*0.04,fx=dx/d*f,fy=dy/d*f;if(!a.fixed){a.vx+=fx;a.vy+=fy;}if(!b.fixed){b.vx-=fx;b.vy-=fy;}}
  // category clustering: pull each colored node toward its category anchor (keeps same-color together)
  for(const nd of NODES){if(nd.fixed||nd.cat==null)continue;const an=CATANCHOR[nd.cat];if(!an)continue;const k=nd.type==='cat'?0.05:nd.type==='entity'?0.04:0.03;nd.vx+=(an.x-nd.x)*k;nd.vy+=(an.y-nd.y)*k;}
  for(const nd of NODES){if(nd.fixed)continue;nd.vx+=(W/2-nd.x)*0.002;nd.vy+=(H/2-nd.y)*0.002;nd.x+=(nd.vx*=0.82)*alpha*1.4;nd.y+=(nd.vy*=0.82)*alpha*1.4;}
}
function render(){
  vp.setAttribute('transform',`translate(${view.x.toFixed(1)},${view.y.toFixed(1)}) scale(${view.k.toFixed(3)})`);
  for(const nd of NODES) nd.el.setAttribute('transform',`translate(${nd.x.toFixed(1)},${nd.y.toFixed(1)})`);
  for(const l of LINKS){l.el.setAttribute('x1',l.s.x.toFixed(1));l.el.setAttribute('y1',l.s.y.toFixed(1));l.el.setAttribute('x2',l.t.x.toFixed(1));l.el.setAttribute('y2',l.t.y.toFixed(1));}
}
// ── interaction ──
function toGraph(ev){const r=svg.getBoundingClientRect();return{x:(ev.clientX-r.left-view.x)/view.k,y:(ev.clientY-r.top-view.y)/view.k};}
let drag=null,pan=null;
function onNodeDown(ev,n){ev.stopPropagation();svg.setPointerCapture(ev.pointerId);const p=toGraph(ev);drag={n,moved:false,ox:p.x-n.x,oy:p.y-n.y};n.fixed=true;}
function bindUI(){
  svg.addEventListener('pointerdown',ev=>{if(drag)return;pan={sx:ev.clientX,sy:ev.clientY,vx:view.x,vy:view.y,moved:false};svg.classList.add('panning');svg.setPointerCapture(ev.pointerId);});
  svg.addEventListener('pointermove',ev=>{
    if(drag){const p=toGraph(ev);drag.n.x=p.x-drag.ox;drag.n.y=p.y-drag.oy;drag.n.vx=drag.n.vy=0;drag.moved=true;alpha=Math.max(alpha,0.3);}
    else if(pan){view.x=pan.vx+(ev.clientX-pan.sx);view.y=pan.vy+(ev.clientY-pan.sy);if(Math.abs(ev.clientX-pan.sx)+Math.abs(ev.clientY-pan.sy)>3)pan.moved=true;}
  });
  svg.addEventListener('pointerup',ev=>{
    if(drag){if(!drag.moved)select(drag.n.id);drag.n.fixed=false;drag=null;}
    else if(pan){if(!pan.moved){select(null);}pan=null;svg.classList.remove('panning');}
  });
  svg.addEventListener('wheel',ev=>{ev.preventDefault();const r=svg.getBoundingClientRect(),mx=ev.clientX-r.left,my=ev.clientY-r.top;const nk=Math.max(0.3,Math.min(3,view.k*(ev.deltaY<0?1.12:0.89)));view.x=mx-(mx-view.x)*(nk/view.k);view.y=my-(my-view.y)*(nk/view.k);view.k=nk;},{passive:false});
}
function zoomBy(f){const nk=Math.max(0.3,Math.min(3,view.k*f));view.x=W/2-(W/2-view.x)*(nk/view.k);view.y=H/2-(H/2-view.y)*(nk/view.k);view.k=nk;}
function resetView(){view={x:0,y:0,k:1};alpha=Math.max(alpha,0.4);}
// ── selection highlight ──
function select(id){
  selId=id;
  if(!id){NODES.forEach(n=>n.el.classList.remove('dim','sel','hl'));LINKS.forEach(l=>l.el.classList.remove('dim','hl'));summary();return;}
  const keep=new Set([id,...(NBR[id]||[])]);
  NODES.forEach(n=>{n.el.classList.toggle('dim',!keep.has(n.id));n.el.classList.toggle('hl',keep.has(n.id)&&n.id!==id);n.el.classList.toggle('sel',n.id===id);});
  LINKS.forEach(l=>{const on=l.s.id===id||l.t.id===id;l.el.classList.toggle('hl',on);l.el.classList.toggle('dim',!on);});
  const n=BYID[id]; if(n.type==='entity')selEntity(n);else if(n.type==='dep')selDep(n);else if(n.type==='cat')selCat(n);else selRule(n);
}
// ── panel ──
function paint(h){const p=document.getElementById('panel');p.innerHTML=h;p.classList.remove('fade');void p.offsetWidth;p.classList.add('fade');}
function summary(){
  const rules=DATA.nodes.filter(n=>n.type==='rule'),ver=rules.filter(n=>n.verified),todo=rules.filter(n=>!n.verified),pct=Math.round(ver.length/rules.length*100);
  const ents=DATA.nodes.filter(n=>n.type==='entity');
  let h=`<div class="pname">สถานะการยืนยัน</div><div class="ban"><span class="v">${ver.length}</span><span class="l">กฎที่ยืนยันความถูกต้องแล้ว<br>(deep-review + เว็บจริง)</span></div><div class="progress"><i style="width:${pct}%"></i></div><div class="body mut">จาก ${rules.length} กฎ — เหลือ ${todo.length} รอไล่ตรวจ · คลิกโหนดในกราฟ หรือเลือกด้านล่าง</div><div class="k">ยืนยันถูกต้องแล้ว</div><div class="chips">${ver.map(n=>`<a class="chip ver" onclick="select('${esc(n.id)}')">${esc(n.label)}</a>`).join('')}</div><div class="k">รอไล่ตรวจ — แยกตามกลุ่ม</div>`;
  for(const en of ents){const kids=todo.filter(n=>n.entity===en.id.replace('__ent_',''));if(!kids.length)continue;h+=`<div class="grp"><div class="grp-h"><span class="catdot" style="background:${COLOR[en.cat]||'#999'}"></span><a class="grp-nm" onclick="select('${esc(en.id)}')" style="cursor:pointer">${esc(en.label)}</a><span class="body mut">${kids.length}</span></div><div class="chips">${kids.map(n=>`<a class="chip" style="--c:${COLOR[en.cat]||'#999'}" onclick="select('${esc(n.id)}')">${esc(n.label)}</a>`).join('')}</div></div>`;}
  paint(h);
}
function selRule(n){
  const cat=(DATA.cats||[]).find(x=>x.key===n.cat)||{label:n.cat,color:'#999'},ent=BYID['__ent_'+n.entity],pend=n.verified?'':' · เสนอ (รอ review)';
  const refs=(n.refs||[]).map(r=>`<a href="${esc(r[1])}" target="_blank" rel="noopener">${esc(r[0])}</a>`).join('')||'<span class="body mut">—</span>';
  const deps=DATA.edges.filter(e=>e[0]===n.id&&e[2]==='dep').map(e=>BYID[e[1]]).filter(Boolean);
  let h=`<button class="back" onclick="${ent?`select('${esc(ent.id)}')`:'select(null)'}">‹ ${ent?esc(ent.label):'ทั้งหมด'}</button><div class="crumb">${esc(cat.label)} › ${esc(ent?ent.label:'')}</div><div class="pname">${esc(n.label)}</div><div class="pmeta"><span class="cat"><i style="background:${cat.color}"></i>${esc(cat.label)}</span><span class="pill ${n.verified?'ok':'todo'}">${n.verified?'ยืนยันถูกต้องแล้ว':'รอตรวจสอบ'}</span></div>${n.note?`<div class="pnote">${esc(n.note)}</div>`:''}`;
  if(!n.verified)h+=`<div class="pending">ยังไม่ได้ไล่ตรวจ false-positive ราย check นี้ — logic ด้านล่างคือสิ่งที่ทำไว้/เสนอ</div>`;
  if(n.what)h+=`<div class="k">ตรวจอะไร · What</div><div class="body">${esc(n.what)}</div>`;
  if(n.why)h+=`<div class="k">ทำไมต้องตรวจ</div><div class="body mut">${esc(n.why)}</div>`;
  if(n.how)h+=`<div class="k">ตรวจอย่างไร · How${pend}</div><ol class="steps">${n.how.map(s=>`<li>${esc(s)}</li>`).join('')}</ol>`;
  if(n.rule)h+=`<div class="k">กฎการตัดสิน · Decision Rule${pend}</div>${n.rule.map(s=>`<div class="rule">${esc(s)}</div>`).join('')}`;
  if(!n.how&&!n.rule&&n.what)h+=`<div class="pending">ยังไม่ได้เขียน workflow/decision ละเอียด</div>`;
  if(deps.length)h+=`<div class="k">Dependencies (ต้องผ่านก่อน)</div><div class="chips">${deps.map(d=>`<a class="chip dep" onclick="select('${esc(d.id)}')">${esc(d.label)}</a>`).join('')}</div>`;
  h+=`<div class="k">มาตรฐานอ้างอิง</div><div class="reflist">${refs}</div>`;
  if(n.conf!=null||n.tier!=null)h+=`<div class="k">Confidence</div><div class="body">${n.conf!=null?n.conf+'%':'—'}${n.tier?` · Tier ${n.tier}`:''}</div>`;
  paint(h);
}
function selEntity(n){
  const cat=(DATA.cats||[]).find(x=>x.key===n.cat)||{label:n.cat,color:'#999'},kids=DATA.nodes.filter(r=>r.type==='rule'&&r.entity===n.id.replace('__ent_','')),v=kids.filter(k=>k.verified).length;
  paint(`<button class="back" onclick="select(null)">‹ ทั้งหมด</button><div class="crumb">${esc(cat.label)} › กลุ่ม</div><div class="pname">${esc(n.label)}</div><div class="pmeta"><span class="cat"><i style="background:${cat.color}"></i>${esc(cat.label)}</span><span class="pill ent">${kids.length} กฎ · ${v} ยืนยัน</span></div><div class="k">กฎทั้งหมดในกลุ่มนี้</div><div class="chips">${kids.map(k=>`<a class="chip ${k.verified?'ver':''}" style="--c:${cat.color}" onclick="select('${esc(k.id)}')">${esc(k.label)}</a>`).join('')}</div>`);
}
function selDep(n){
  const usedBy=DATA.edges.filter(e=>e[2]==='dep'&&e[1]===n.id).map(e=>BYID[e[0]]).filter(Boolean);
  const refs=(n.refs||[]).map(r=>`<a href="${esc(r[1])}" target="_blank" rel="noopener">${esc(r[0])}</a>`).join('')||'<span class="body mut">—</span>';
  let h=`<button class="back" onclick="select(null)">‹ ทั้งหมด</button><div class="crumb">Dependency — input ของกฎ</div><div class="pname">${esc(n.label)}</div><div class="pmeta"><span class="pill dep">dependency</span>${n.verified?`<span class="pill ok">ยืนยันแล้ว</span>`:''}</div>${n.note?`<div class="pnote">${esc(n.note)}</div>`:''}`;
  if(n.what)h+=`<div class="k">คืออะไร</div><div class="body">${esc(n.what)}</div>`;
  if(n.how)h+=`<div class="k">ทำงานอย่างไร</div><ol class="steps">${n.how.map(s=>`<li>${esc(s)}</li>`).join('')}</ol>`;
  if(n.rule)h+=`<div class="k">กฎ</div>${n.rule.map(s=>`<div class="rule">${esc(s)}</div>`).join('')}`;
  h+=`<div class="k">เป็น dependency ของกฎ</div><div class="chips">${usedBy.map(r=>`<a class="chip ${r.verified?'ver':''}" style="--c:${COLOR[r.cat]||'#999'}" onclick="select('${esc(r.id)}')">${esc(r.label)}</a>`).join('')||'—'}</div>`;
  if((n.refs||[]).length)h+=`<div class="k">มาตรฐานอ้างอิง</div><div class="reflist">${refs}</div>`;
  paint(h);
}
function selCat(n){
  const ents=DATA.nodes.filter(e=>e.type==='entity'&&e.cat===n.cat);
  paint(`<button class="back" onclick="select(null)">‹ ทั้งหมด</button><div class="crumb">หมวด</div><div class="pname">${esc(n.label)}</div><div class="pmeta"><span class="cat"><i style="background:${COLOR[n.cat]||'#999'}"></i>${ents.length} กลุ่ม</span></div><div class="k">กลุ่มในหมวดนี้</div><div class="chips">${ents.map(e=>`<a class="chip" style="--c:${COLOR[n.cat]||'#999'}" onclick="select('${esc(e.id)}')">${esc(e.label)}${ENTVER[e.id]?'  ✓'+ENTVER[e.id]:''}</a>`).join('')}</div>`);
}
</script>
