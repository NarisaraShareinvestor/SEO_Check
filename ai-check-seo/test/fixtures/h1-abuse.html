<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>หน้าที่มี H1 เยอะเกินไป — ทดสอบ h1-multiple</title>
  <meta name="description" content="fixture จงใจใส่ H1 จำนวนมากเลียนแบบ qh.co.th ที่เอา H1 ไปครอบ slider และ section headers">
  <link rel="canonical" href="https://example.com/h1-abuse">
</head>
<body>
  <!-- จงใจใส่ H1 หกตัว (>3) เลียนแบบ slider/section header abuse ที่เจอใน qh.co.th -->
  <h1>โครงการ A</h1>
  <h1>โครงการ B</h1>
  <h1>โครงการ C</h1>
  <h1>โครงการ D</h1>
  <h1>โครงการ E</h1>
  <h1>โครงการ F</h1>
  <p>เนื้อหาของหน้าที่มีปัญหา H1 หลายตัวซึ่งทำให้ Google สับสนว่าหน้านี้เกี่ยวกับอะไรกันแน่ ควรเหลือ H1 เดียวเท่านั้น</p>
</body>
</html>
