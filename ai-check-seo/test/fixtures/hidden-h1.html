<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>หน้าที่ซ่อน H1 ด้วย CSS — ทดสอบ h1-hidden</title>
  <meta name="description" content="fixture จงใจซ่อน H1 ด้วย visibility:hidden เลียนแบบ hidden-text manipulation ที่เจอใน richsport.co.th">
  <link rel="canonical" href="https://example.com/hidden-h1">
</head>
<body>
  <!-- จงใจซ่อน H1 ด้วย visibility:hidden — มีข้อความใน HTML แต่ผู้ใช้มองไม่เห็น -->
  <h1 style="visibility:hidden">คีย์เวิร์ดที่ยัดไว้ให้ Google เห็นแต่คนมองไม่เห็น</h1>
  <h2>หัวข้อที่มองเห็นจริง</h2>
  <p>เนื้อหาที่แสดงให้ผู้ใช้เห็นตามปกติ แต่ H1 ด้านบนถูกซ่อนไว้ด้วย CSS ซึ่ง Google อาจตีว่าเป็น hidden text manipulation</p>
</body>
</html>
